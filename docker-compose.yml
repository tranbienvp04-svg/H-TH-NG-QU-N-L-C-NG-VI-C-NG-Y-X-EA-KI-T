version: '3.9'
services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: danguy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    env_file:
      - .env.production.example
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:123456@db:5432/danguy
    expose:
      - '8000'
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    expose:
      - '80'
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
