{% extends "base.html" %}{% block content %}
<div class="grid cols-2">
<div class="box"><h3>🔐 Bước 1 - Gửi mã OTP</h3><form method="post" action="/forgot-password/send-otp"><label>Số điện thoại</label><input name="phone" required><button type="submit">Gửi mã OTP</button></form></div>
<div class="box"><h3>🧩 Bước 2 - Xác thực OTP & đặt lại mật khẩu</h3><form method="post" action="/forgot-password/verify"><label>Số điện thoại</label><input name="phone" required><label>Mã OTP</label><input name="otp" required><label>Mật khẩu mới</label><input type="password" name="new_password" required><label>Xác nhận mật khẩu</label><input type="password" name="confirm_password" required><button type="submit">Đặt lại mật khẩu</button></form>{% if msg %}<p><b>{{msg}}</b></p>{% endif %}</div>
</div>
{% endblock %}
